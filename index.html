<!DOCTYPE html>
<html>
<head>
    <title>Teacher Appreciation Gallery</title>
    <style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f4f4f4;
        margin: 0;
        padding: 0;
    }

    h1 {
        margin: 20px 0;
    }

    .gallery {
        display: grid !important;
        grid-template-columns: repeat(5, 1fr) !important;
        gap: 10px;
        padding: 20px;
        max-width: 1400px;
        margin: 0 auto;
    }

    .gallery img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
        display: block;
    }

    /* Tablet */
    @media (max-width: 1000px) {
        .gallery {
            grid-template-columns: repeat(3, 1fr) !important;
        }
    }

    /* Mobile */
    @media (max-width: 600px) {
        .gallery {
            grid-template-columns: repeat(2, 1fr) !important;
        }
    }
</style>
</head>
<body>

<h1>Teacher Appreciation Gallery</h1>

<div class="gallery">
    <img src="images/img1.jpeg">
    <img src="images/img2.jpeg">
    <img src="images/img3.jpeg">
    <img src="images/img4.jpeg">
    <img src="images/img5.jpeg">
    <img src="images/img6.jpeg">
    <img src="images/img8.jpeg">
    <img src="images/img9.jpeg">
    <img src="images/img10.jpeg">
    <img src="images/img11.jpeg">
    <img src="images/img12.jpeg">
    <img src="images/img13.jpeg">
    <img src="images/img14.jpeg">
    <img src="images/img15.jpeg">
    <img src="images/img16.jpeg">
    <img src="images/img17.jpeg">
    <img src="images/img18.jpeg">
    <img src="images/img19.jpeg">
    <img src="images/img20.jpeg">
    <img src="images/img21.jpeg">
    <img src="images/img22.jpeg">
    <img src="images/img23.jpeg">
    <img src="images/img24.jpeg">
    <img src="images/img25.jpeg">
    
</div>

</body>
</html>
